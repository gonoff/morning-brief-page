<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Morning Brief</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: radial-gradient(120% 120% at 50% 0%, #1a2238 0%, #0b0f1a 60%);
      color: #e7ecf5; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .wrap { max-width: 480px; }
    .sun { font-size: 64px; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    p { margin-top: 12px; color: #9aa7c2; line-height: 1.5; }
    .pill {
      display: inline-block; margin-top: 20px; padding: 8px 16px;
      background: #16203a; border: 1px solid #26345c; border-radius: 999px;
      font-size: 13px; color: #7fa4ff; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="sun">🌅</div>
    <h1>Morning Brief</h1>
    <p>Your first day plan lands here tomorrow at <strong>6:00 AM</strong>.<br>
       The agent's still warming up — go get some rest. 💪</p>
    <span class="pill">waiting for first run</span>
  </div>
</body>
</html>
