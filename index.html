<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Morning Brief</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #263348; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --amber: #f59e0b; --emerald: #10b981;
    --indigo: #818cf8; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6; --gap: 1.25rem;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; padding: 1rem; max-width: 1100px; margin: 0 auto; }
  .notice { background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.85rem; color: #93c5fd; margin-bottom: 1rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header .date { font-size: 0.9rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.3rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
  .badge { display: inline-block; padding: 0.35rem 1.1rem; border-radius: 999px; font-weight: 700; font-size: 1rem; letter-spacing: 0.05em; }
  .badge-solid { background: #1d4ed8; color: #bfdbfe; }
  .badge-chill { background: #065f46; color: #a7f3d0; }
  .badge-brutal { background: #7f1d1d; color: #fecaca; }
  header .hype { margin-top: 0.75rem; font-size: 1.05rem; color: var(--muted); font-style: italic; }
  .graphs { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: var(--gap); margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
  .rings { display: flex; gap: 1.5rem; justify-content: center; align-items: center; flex-wrap: wrap; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
  .ring-label { font-size: 0.75rem; color: var(--muted); text-align: center; max-width: 90px; }
  .ring-pct { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .timeline-bar { position: relative; height: 48px; background: var(--surface2); border-radius: 8px; overflow: hidden; }
  .tl-seg { position: absolute; top: 0; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; color: rgba(255,255,255,0.9); overflow: hidden; white-space: nowrap; border-right: 1px solid rgba(15,23,42,0.5); }
  .tl-label { font-size: 0.7rem; color: var(--muted); display: flex; justify-content: space-between; margin-top: 0.3rem; }
  .tl-legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.6rem; font-size: 0.72rem; color: var(--muted); }
  .tl-legend span { display: inline-flex; align-items: center; gap: 0.3rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .gauge-wrap { display: flex; align-items: center; gap: 1rem; }
  .gauge-text strong { font-size: 1.4rem; color: var(--text); display: block; }
  .gauge-text span { color: var(--muted); font-size: 0.8rem; }
  .gauge-text .spare { color: var(--emerald); }
  .gauge-text .over { color: var(--amber); }
  section.project { margin-bottom: 2rem; }
  .proj-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
  .proj-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .proj-header h2 { font-size: 1.1rem; font-weight: 700; }
  .proj-header .client { font-size: 0.8rem; color: var(--muted); }
  .proj-header .spacer { flex: 1; }
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 0.85rem; }
  .task-meta { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
  .task-time { font-size: 0.8rem; color: var(--muted); font-weight: 600; }
  .est-badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); font-weight: 700; }
  .task-id { font-size: 0.72rem; color: var(--muted); }
  .prio-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .prio-high { background: var(--red); }
  .prio-med { background: var(--yellow); }
  .prio-low { background: var(--muted); }
  .task-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; color: var(--text); }
  .prep-row { margin-bottom: 0.55rem; }
  .prep-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.15rem; }
  .prep-body { font-size: 0.88rem; color: var(--text); }
  .prep-body ol, .prep-body ul { padding-left: 1.2rem; margin-top: 0.2rem; }
  .prep-body li { margin-bottom: 0.15rem; }
  code { background: var(--surface2); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.82em; font-family: 'SF Mono', ui-monospace, monospace; }
  .copy-btn { margin-top: 0.5rem; display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.8rem; cursor: pointer; font-family: inherit; }
  .copy-btn:hover { background: var(--border); color: var(--text); }
  .waiting-card { background: var(--surface); border: 1px solid #475569; border-radius: 8px; padding: 0.7rem 1rem; margin-bottom: 0.5rem; }
  .waiting-card .wtask { font-weight: 600; color: var(--text); font-size: 0.88rem; }
  .waiting-card .wreason { color: var(--muted); font-size: 0.82rem; }
  .ondeck { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
  .ondeck h3 { font-size: 0.95rem; font-weight: 700; }
  .ondeck-sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
  footer { text-align: center; font-size: 0.78rem; color: var(--muted); padding-top: 1.5rem; border-top: 1px solid var(--border); margin-top: 2rem; }
  .section-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.85rem; }
  .empty { text-align: center; padding: 6rem 1rem; color: var(--muted); }
  .empty .sun { font-size: 56px; }
  .empty h1 { font-size: 1.4rem; color: var(--text); margin: 0.5rem 0; }
  .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); background: var(--emerald); color: #04130c; font-weight: 700; padding: 0.6rem 1.2rem; border-radius: 999px; opacity: 0; transition: all 0.2s; pointer-events: none; font-size: 0.85rem; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) { body { padding: 0.6rem; font-size: 14px; } header h1 { font-size: 1.2rem; } .task-card { padding: 0.9rem 1rem; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast">Copied ✓</div>
<script>
const PALETTE = ['#f59e0b','#10b981','#818cf8','#3b82f6','#ec4899','#22d3ee'];
const RING_CIRC = 2 * Math.PI * 32;
const EST = { s: 'S · 30 min', m: 'M · 1h', l: 'L · 2h' };

const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const code = s => esc(s).replace(/`([^`]+)`/g, '<code>$1</code>');
const t2m = t => { const p = String(t).split(':'); return (+p[0]) * 60 + (+(p[1]||0)); };
const fmtClock = t => { const p = String(t).split(':'); return (+p[0]) + ':' + (p[1]||'00'); };
const fmtHour = m => { let h = Math.floor(m/60), ap = h>=12?'PM':'AM', hh = h%12||12; return hh + (m%60? ':'+String(m%60).padStart(2,'0'):'') + ' ' + ap; };
const fmtMins = m => { const h = Math.floor(m/60), mm = Math.round(m%60); return (h?h+'h':'') + (mm?' '+mm+'m':'') || '0m'; };

function ring(pct, color, size) {
  size = size || 80;
  const off = RING_CIRC * (1 - Math.max(0, Math.min(1, pct)));
  return `<svg width="${size}" height="${size}" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="32" fill="none" stroke="#263348" stroke-width="10"/>
    <circle cx="40" cy="40" r="32" fill="none" stroke="${color}" stroke-width="10"
      stroke-dasharray="${RING_CIRC.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"
      stroke-linecap="round" transform="rotate(-90 40 40)"/>
    <text x="40" y="45" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">${Math.round(pct*100)}%</text>
  </svg>`;
}
function prioClass(p) { p = (p||'').toLowerCase(); return p[0]==='h'?'prio-high':p[0]==='l'?'prio-low':'prio-med'; }
function ratingColor(r) { r=(r||'').toLowerCase(); return r==='chill'?'#10b981':r==='brutal'?'#f59e0b':'#3b82f6'; }
function badgeClass(r) { r=(r||'').toLowerCase(); return r==='chill'?'badge-chill':r==='brutal'?'badge-brutal':'badge-solid'; }

function isOnDeck(p, b) {
  if (typeof p.on_deck === 'boolean') return p.on_deck;
  if (Array.isArray(b.on_deck) && typeof b.on_deck[0] === 'string') return b.on_deck.includes(p.slug);
  if (Array.isArray(b.focus_projects)) return !b.focus_projects.includes(p.slug);
  return !(p.tasks && p.tasks.length);
}
function approachSteps(a) {
  if (Array.isArray(a)) return a;
  if (!a) return [];
  const s = String(a).trim();
  const byNum = s.split(/\s*\d+\.\s+/).map(x=>x.trim()).filter(Boolean);
  if (byNum.length > 1) return byNum;
  const byNl = s.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  return byNl.length > 1 ? byNl : [s];
}
function pctOf(p) {
  const tot = +p.tasks_total || 0, done = +p.tasks_done || 0;
  return tot > 0 ? done/tot : null;
}

let COPY = {};
function copyProject(slug) {
  navigator.clipboard.writeText(COPY[slug] || '{}').then(() => {
    const t = document.getElementById('toast'); t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1400);
  });
}

function render(b) {
  const projects = b.projects || [];
  const focus = projects.filter(p => !isOnDeck(p, b));
  const onDeck = projects.filter(p => isOnDeck(p, b));
  const colorOf = {};
  focus.forEach((p, i) => colorOf[p.slug] = PALETTE[i % PALETTE.length]);
  onDeck.forEach(p => colorOf[p.slug] = '#64748b');

  const d = new Date((b.date || '') + 'T12:00:00');
  const dateStr = isNaN(d) ? (b.date||'') : d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
  document.title = 'Morning Brief — ' + dateStr;

  let h = '';
  if (b.notice) h += `<div class="notice">ℹ️ ${code(b.notice)}</div>`;

  const dif = b.difficulty || {};
  const ratio = +dif.ratio || (dif.available_minutes ? dif.planned_minutes/dif.available_minutes : 0);
  h += `<header>
    <div class="date">${esc(dateStr)}</div>
    <h1>${esc(b.greeting || 'Morning, Haniel.')}</h1>
    <span class="badge ${badgeClass(dif.rating)}">⚡ ${esc(dif.rating||'')} Day — ${Math.round(ratio*100)}%</span>
    ${b.hype ? `<div class="hype">${esc(b.hype)}</div>` : ''}
  </header>`;

  // graphs: rings + gauge
  let ringsHtml = '';
  projects.forEach(p => {
    const pc = pctOf(p);
    ringsHtml += `<div class="ring-wrap">
      ${pc===null ? `<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="32" fill="none" stroke="${colorOf[p.slug]}" stroke-width="10" opacity="0.4"/><text x="40" y="45" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">${(p.tasks||[]).length||'—'}</text></svg>` : ring(pc, colorOf[p.slug])}
      <div class="ring-label">${esc(p.project||p.slug)}${isOnDeck(p,b)?' (on deck)':''}</div>
      ${p.tasks_total ? `<div class="ring-pct">${p.tasks_done||0} / ${p.tasks_total}</div>` : ''}
    </div>`;
  });

  const planned = +dif.planned_minutes || 0, avail = +dif.available_minutes || 0;
  const spare = avail - planned;
  const gauge = `<div class="gauge-wrap">
    ${ring(ratio, ratingColor(dif.rating), 90)}
    <div class="gauge-text">
      <strong>${fmtMins(planned)}</strong>
      <span>planned of ${fmtMins(avail)} available</span><br>
      ${spare>=0 ? `<span class="spare">${fmtMins(spare)} to spare</span>` : `<span class="over">over by ${fmtMins(-spare)}</span>`}
      ${dif.note ? `<br><span>${esc(dif.note)}</span>` : ''}
    </div></div>`;

  h += `<div class="graphs">
    <div class="card"><div class="card-title">Project Progress</div><div class="rings">${ringsHtml}</div></div>
    <div class="card"><div class="card-title">Day Load</div>${gauge}</div>
  </div>`;

  // timeline
  const sched = (b.schedule || []).filter(s => s.start && s.end);
  if (sched.length) {
    const win = b.window || { start: sched[0].start, end: sched[sched.length-1].end };
    const W0 = t2m(win.start), W1 = t2m(win.end), WD = Math.max(1, W1 - W0);
    let segs = '';
    sched.forEach(s => {
      const left = (t2m(s.start)-W0)/WD*100, width = Math.max(2,(t2m(s.end)-t2m(s.start))/WD*100);
      const isLunch = s.kind === 'lunch';
      const col = isLunch ? '#475569' : (colorOf[s.slug] || '#3b82f6');
      const lbl = isLunch ? 'lunch' : (s.task_id || '');
      segs += `<div class="tl-seg" style="left:${left}%;width:${width}%;background:${col}">${esc(lbl)}</div>`;
    });
    let legend = focus.map(p=>`<span><span class="legend-dot" style="background:${colorOf[p.slug]}"></span>${esc(p.project||p.slug)}</span>`).join('');
    legend += `<span><span class="legend-dot" style="background:#475569"></span>Lunch</span>`;
    h += `<div class="card" style="margin-bottom:2rem">
      <div class="card-title">Day Timeline</div>
      <div class="timeline-bar">${segs}</div>
      <div class="tl-label"><span>${fmtHour(W0)}</span><span>${fmtHour((W0+W1)/2)}</span><span>${fmtHour(W1)}</span></div>
      <div class="tl-legend">${legend}</div>
    </div>`;
  }

  // focus project sections
  focus.forEach(p => {
    const pc = pctOf(p);
    COPY[p.slug] = JSON.stringify({
      project: p.project, client: p.client, date: b.date,
      tasks: (p.tasks||[]).map(t => ({ id:t.id, title:t.title, phase:t.phase, estimate:t.estimate, priority:t.priority, status:t.status, notes:t.notes, prep:t.prep }))
    }, null, 2);
    let cards = '';
    (p.tasks||[]).forEach(t => {
      const blk = t.block || {};
      const prep = t.prep || {};
      const steps = approachSteps(prep.approach);
      const res = Array.isArray(prep.resources) ? prep.resources : (prep.resources?[prep.resources]:[]);
      cards += `<div class="task-card">
        <div class="task-meta">
          ${blk.start ? `<span class="task-time">${fmtClock(blk.start)} – ${fmtClock(blk.end)}</span>` : ''}
          <span class="est-badge">${EST[(t.estimate||'').toLowerCase()] || esc(t.estimate||'')}</span>
          <span class="prio-dot ${prioClass(t.priority)}"></span>
          <span class="task-id">${esc(t.id||'')}${t.priority?' · '+esc(String(t.priority).toUpperCase()):''}</span>
        </div>
        <div class="task-title">${esc(t.title||'')}</div>
        ${prep.what ? `<div class="prep-row"><div class="prep-label">What</div><div class="prep-body">${code(prep.what)}</div></div>` : ''}
        ${prep.understand ? `<div class="prep-row"><div class="prep-label">Understand</div><div class="prep-body">${code(prep.understand)}</div></div>` : ''}
        ${steps.length ? `<div class="prep-row"><div class="prep-label">Approach</div><div class="prep-body"><ol>${steps.map(s=>`<li>${code(s)}</li>`).join('')}</ol></div></div>` : ''}
        ${res.length ? `<div class="prep-row"><div class="prep-label">Resources</div><div class="prep-body"><ul>${res.map(r=>`<li>${code(r)}</li>`).join('')}</ul></div></div>` : ''}
      </div>`;
    });
    h += `<section class="project">
      <div class="proj-header">
        <span class="proj-dot" style="background:${colorOf[p.slug]}"></span>
        <div><h2>${esc(p.project||p.slug)}</h2><div class="client">${esc(p.client||'')}</div></div>
        <span class="spacer"></span>
        ${pc!==null ? ring(pc, colorOf[p.slug], 44) : ''}
      </div>
      ${cards}
      <button class="copy-btn" onclick="copyProject('${esc(p.slug)}')">📋 Copy tasks JSON — ${esc(p.project||p.slug)}</button>
    </section>`;
  });

  // on deck
  if (onDeck.length) {
    h += onDeck.map(p => `<div class="ondeck">
      ${pctOf(p)!==null ? ring(pctOf(p), '#64748b', 56) : ''}
      <div><h3>${esc(p.project||p.slug)} · on deck</h3>
      <div class="ondeck-sub">Deferred today to protect focus${p.tasks_total?` — ${p.tasks_done||0}/${p.tasks_total} done`:''}.</div></div>
    </div>`).join('');
  }

  // waiting on
  if ((b.waiting_on||[]).length) {
    h += `<div class="section-label">⏳ Waiting on</div>`;
    h += b.waiting_on.map(w => `<div class="waiting-card">
      <div class="wtask">${esc(w.title||'')} <span style="color:var(--muted);font-weight:400">— ${esc(w.project||'')} ${esc(w.task_id||'')}</span></div>
      <div class="wreason">${code(w.reason||'')}</div>
    </div>`).join('');
  }

  h += `<footer>Data as of ${esc((b.data_as_of||'').replace('T',' ').slice(0,16))} UTC · generated ${esc((b.generated_at||'').replace('T',' ').slice(0,16))} UTC</footer>`;

  document.getElementById('app').innerHTML = h;
}

function showEmpty() {
  document.getElementById('app').innerHTML = `<div class="empty">
    <div class="sun">🌅</div><h1>No brief yet</h1>
    <p>Your day plan lands here every weekday at <strong>6:00 AM</strong>.<br>Go get some rest. 💪</p>
  </div>`;
}

fetch('brief-latest.json?_=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('no brief'); return r.json(); })
  .then(render)
  .catch(showEmpty);
</script>
</body>
</html>
